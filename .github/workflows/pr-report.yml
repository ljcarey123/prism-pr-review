name: Deploy PR Review Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write       # push to gh-pages branch
  pull-requests: write  # post PR comments

jobs:
  deploy-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Check report exists
        id: check
        run: |
          if [ -f ".pr/index.html" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No .pr/index.html found — skipping deployment."
            echo "Run /ship in Claude Code to generate a report before pushing."
          fi

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.exists == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .pr
          destination_dir: prs/${{ github.event.pull_request.number }}
          keep_files: true  # preserve other PRs' reports

      - name: Post or update PR comment
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNum = context.issue.number;
            const url   = `https://${owner}.github.io/${repo}/prs/${prNum}/`;

            const body = [
              '## 🔮 PR Review Report',
              '',
              `**[View interactive report →](${url})**`,
              '',
              '| | |',
              '|---|---|',
              `| Branch | \`${{ github.head_ref }}\` |`,
              `| Target | \`${{ github.base_ref }}\` |`,
              `| Commit | ${{ github.event.pull_request.head.sha && github.event.pull_request.head.sha.substring(0, 7) }} |`,
              '',
              '*Generated by [prism](https://github.com/ljcarey123/prism-pr-review) 🔮*',
            ].join('\n');

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNum });
            const existing = comments.data.find(c => c.body.includes('🔮 PR Review Report'));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNum, body });
            }
